parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\EncryptionService:
        arguments:
            $appSecret: '%kernel.secret%'

    App\Service\SmsService:
        arguments:
            $smsApiKey: '%env(SMS_API_KEY)%'
            $smsApiUrl: '%env(SMS_API_URL)%'
            $smsSender: '%env(SMS_SENDER)%'
